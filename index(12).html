<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Daily Betting Model</title>
<style>
:root{--bg:#07111b;--card:#111d2c;--card2:#17263a;--line:#2b405d;--text:#f2f6ff;--muted:#9fb0c7;--blue:#5db7ff;--green:#38d47a;--yellow:#f3c74d;--red:#e85d5d;--chip:#23364f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-weight:650}.wrap{max-width:1100px;margin:0 auto;padding:10px 12px 92px}.top{display:flex;gap:10px;align-items:center;justify-content:space-between}.title h1{font-size:22px;line-height:1;margin:0}.title p{font-size:12px;margin:4px 0 0;color:var(--muted);font-weight:500}.keybar{display:flex;gap:8px;align-items:center}input,select,button{border:1px solid var(--line);border-radius:12px;background:#0d1624;color:var(--text);font:inherit;padding:12px}button{cursor:pointer;background:var(--card2);font-weight:850}.primary{background:var(--blue);border-color:var(--blue);color:#06101b}.green{background:#4ad27d;color:#06101b;border-color:#4ad27d}.grid{display:grid;gap:10px}.controls{grid-template-columns:1.2fr 1fr 1fr 1fr;margin-top:12px}.stats{grid-template-columns:repeat(4,1fr);margin-top:10px}.stat,.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px}.stat b{font-size:25px;display:block}.stat span{font-size:12px;color:var(--muted)}.tabs,.filters{display:flex;gap:8px;margin-top:10px;overflow:auto}.tab,.filter{border-radius:999px;padding:10px 14px;background:var(--chip);color:var(--muted);white-space:nowrap}.tab.active,.filter.active{background:var(--blue);color:#06101b}.status{margin-top:10px;color:var(--muted);font-size:13px}.topbets{grid-template-columns:repeat(3,1fr);margin-top:10px}.topbet{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;min-height:88px}.topbet .rank{color:var(--muted);font-size:12px}.topbet .pick{font-size:18px;margin:5px 0}.topbet .meta{font-size:12px;color:var(--muted)}.section{margin-top:12px}.sectionHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.sectionHead h2{font-size:16px;margin:0}.sectionHead small{color:var(--muted)}.list{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:0 12px}.row{display:grid;grid-template-columns:80px 1fr 86px;gap:10px;align-items:center;padding:12px 0;border-bottom:1px solid #263952}.row:last-child{border-bottom:0}.badge{display:inline-flex;align-items:center;justify-content:center;min-width:48px;padding:7px 9px;border-radius:999px;font-size:12px}.bet{background:#123d2c;color:#48e286}.strong{background:#173a22;color:#62f59b}.consider{background:#55441d;color:#ffd966}.type{background:#21354f;color:#b9d8ff}.pass{background:#313b4b;color:#aeb9c8}.pickTitle{font-size:16px;line-height:1.2}.pickTitle small{color:var(--muted);font-weight:600}.sub{font-size:12px;color:var(--muted);margin-top:3px}.score{text-align:right;font-size:20px;line-height:1}.score small{display:block;color:var(--muted);font-size:11px;margin-top:2px}.why{margin-top:8px;color:var(--muted);font-size:12px;font-weight:600}.whyBox{display:none;margin-top:8px;padding:10px;background:#0b1420;border:1px solid #20344d;border-radius:10px;color:#cbd7e8;font-size:12px;line-height:1.45}.whyBox.open{display:block}.parlayCard{padding:12px;border-top:1px solid #263952}.parlayCard:first-child{border-top:0}.empty{color:var(--muted);padding:18px;text-align:center}.footer{position:fixed;left:0;right:0;bottom:0;background:rgba(7,17,27,.96);border-top:1px solid var(--line);padding:9px 12px}.footerInner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.hidden{display:none!important}@media(max-width:760px){.wrap{padding:10px 10px 86px}.top{align-items:flex-start}.keybar{width:44%;flex-direction:column}.keybar input,.keybar button{width:100%}.controls{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(2,1fr)}.topbets{grid-template-columns:1fr}.row{grid-template-columns:56px 1fr 62px}.pickTitle{font-size:15px}.score{font-size:18px}.footerInner{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="title"><h1>Daily Betting Model</h1><p>FanDuel-only · one best market per game · no fake picks</p></div>
    <div class="keybar"><input id="apiKey" placeholder="Odds API key" type="password"><button id="saveKey">Save</button></div>
  </div>
  <div class="grid controls">
    <select id="sport"></select><input id="date" type="date"><button class="primary" id="refresh">Refresh Odds</button><button id="propsBtn">Load Props</button>
  </div>
  <div class="grid stats">
    <div class="stat"><b id="credits">—</b><span>API Credits Left</span></div><div class="stat"><b id="activeGames">0</b><span>Active Games</span></div><div class="stat"><b id="qualified">0</b><span>Qualified Bets</span></div><div class="stat"><b id="strongBets">0</b><span>Strong Bets</span></div>
  </div>
  <div class="tabs"><button class="tab active" data-tab="bets">Bets</button><button class="tab" data-tab="props">Props</button><button class="tab" data-tab="parlays">Parlays</button></div>
  <div class="grid controls">
    <select id="viewFilter"><option value="qualified">All Qualified</option><option value="best">Best Market Per Game</option><option value="strong">Strong Only</option><option value="favorites">Favorites Only</option><option value="underdogs">Underdogs Only</option><option value="allmarkets">Show All Markets</option></select>
    <select id="sortBy"><option value="score">Sort: Confidence</option><option value="kelly">Sort: Kelly</option><option value="edge">Sort: Edge</option><option value="time">Sort: Start Time</option></select>
    <button id="hideStarted">Hide Started: On</button><button id="liveMode">Live Mode: Off</button>
  </div>
  <div class="panel status" id="status">Ready.</div>
  <div class="grid topbets" id="topBets"></div>
  <div id="betsView" class="section"><div class="sectionHead"><h2>Qualified Bets</h2><small>ML · spread · totals</small></div><div class="list" id="betsList"></div></div>
  <div id="propsView" class="section hidden"><div class="sectionHead"><h2>Qualified Props</h2><small>FanDuel only</small></div><div class="list" id="propsList"></div></div>
  <div id="parlaysView" class="section hidden"><div class="sectionHead"><h2>Parlays</h2><small>top non-conflicting legs</small></div><div class="list" id="parlaysList"></div></div>
</div>
<div class="footer"><div class="footerInner"><button class="tab active" data-tab="bets">Bets</button><button class="tab" data-tab="props">Props</button><button class="tab" data-tab="parlays">Parlays</button></div></div>
<script>
const ODDS_HOST='https://api.the-odds-api.com/v4/sports/';
const SPORTS={
  MLB:{label:'MLB',key:'baseball_mlb',espn:'baseball/mlb',markets:'h2h,spreads,totals'},
  WNBA:{label:'WNBA',key:'basketball_wnba',espn:'basketball/wnba',markets:'h2h,spreads,totals'},
  NBA:{label:'NBA',key:'basketball_nba',espn:'basketball/nba',markets:'h2h,spreads,totals'},
  NFL:{label:'NFL',key:'americanfootball_nfl',espn:'football/nfl',markets:'h2h,spreads,totals'},
  NCAAF:{label:'NCAAF',key:'americanfootball_ncaaf',espn:'football/college-football',markets:'h2h,spreads,totals'},
  NCAAB:{label:'NCAAB',key:'basketball_ncaab',espn:'basketball/mens-college-basketball',markets:'h2h,spreads,totals'},
  NHL:{label:'NHL',key:'icehockey_nhl',espn:'hockey/nhl',markets:'h2h,spreads,totals'},
  UFC:{label:'UFC/MMA',key:'mma_mixed_martial_arts',espn:'mma/ufc',markets:'h2h'},
  MLS:{label:'MLS Soccer',key:'soccer_usa_mls',espn:'soccer/usa.1',markets:'h2h,spreads,totals'},
  EPL:{label:'EPL Soccer',key:'soccer_epl',espn:'soccer/eng.1',markets:'h2h,spreads,totals'},
  UCL:{label:'Champions League',key:'soccer_uefa_champs_league',espn:'soccer/uefa.champions',markets:'h2h,spreads,totals'},
  WORLDCUP:{label:'World Cup',key:'soccer_fifa_world_cup',espn:'soccer/fifa.world',markets:'h2h,spreads,totals'}
};
const PROPS={MLB:'batter_hits,batter_total_bases,pitcher_strikeouts',WNBA:'player_points,player_rebounds,player_assists',NBA:'player_points,player_rebounds,player_assists',NFL:'player_pass_yds,player_rush_yds,player_receptions,player_anytime_td',NHL:'player_points,player_shots_on_goal',MLS:'player_shots_on_target,player_anytime_goal_scorer',EPL:'player_shots_on_target,player_anytime_goal_scorer'};
let state={games:[],allBets:[],bestBets:[],props:[],hideStarted:true,live:false,tab:'bets',timer:null};
const $=id=>document.getElementById(id); const fmt=n=>Number.isFinite(n)?Number(n).toFixed(1):'—'; const pct=n=>fmt(n)+'%';
function init(){Object.entries(SPORTS).forEach(([k,v])=>$('sport').add(new Option(v.label,k)));$('date').value=new Date().toISOString().slice(0,10);$('apiKey').value=localStorage.oddsApiKey||'';$('sport').value=localStorage.sport||'MLB';['sport','date','viewFilter','sortBy'].forEach(id=>$(id).onchange=()=>{localStorage.sport=$('sport').value;render()});$('saveKey').onclick=()=>{localStorage.oddsApiKey=$('apiKey').value.trim();setStatus('API key saved locally on this device.')};$('refresh').onclick=loadAll;$('propsBtn').onclick=loadProps;$('hideStarted').onclick=()=>{state.hideStarted=!state.hideStarted;$('hideStarted').textContent='Hide Started: '+(state.hideStarted?'On':'Off');loadAll()};$('liveMode').onclick=toggleLive;document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));loadAll()}
async function loadAll(){const key=$('apiKey').value.trim();if(!key){setStatus('Enter your Odds API key. No key = no picks.');return}setStatus('Loading ESPN schedule + FanDuel odds...');try{const [espn,odds]=await Promise.all([loadESPN(),loadOdds(key)]);state.games=normalizeGames(espn,odds);state.allBets=buildBets(state.games);state.bestBets=bestPerGame(state.allBets);updateStats();render();setStatus(`Loaded ${state.games.length} active games. Showing FanDuel-only, market-anchored picks.`)}catch(e){console.error(e);setStatus('Load failed: '+e.message)}}
async function loadESPN(){const s=SPORTS[$('sport').value];const d=$('date').value.replaceAll('-','');let url=`https://site.api.espn.com/apis/site/v2/sports/${s.espn}/scoreboard?dates=${d}`;let r=await fetch(url);if(!r.ok)throw new Error('ESPN schedule unavailable');return await r.json()}
async function loadOdds(key){const s=SPORTS[$('sport').value];const url=`${ODDS_HOST}${s.key}/odds/?apiKey=${encodeURIComponent(key)}&regions=us&markets=${s.markets}&bookmakers=fanduel&oddsFormat=american&dateFormat=iso` ;let r=await fetch(url);$('credits').textContent=r.headers.get('x-requests-remaining')||'—';if(!r.ok)throw new Error('Odds API failed. Check key/sport/credits.');return await r.json()}
function normalizeGames(espn,odds){const now=Date.now();const oddsMap=new Map(odds.map(o=>[norm(o.away_team)+'|'+norm(o.home_team),o]));return (espn.events||[]).map(ev=>{const comp=ev.competitions?.[0];const cs=comp?.competitors||[];const away=cs.find(c=>c.homeAway==='away')||cs[1];const home=cs.find(c=>c.homeAway==='home')||cs[0];const status=ev.status?.type?.state||'';const started=new Date(ev.date).getTime()<now||status!=='pre';const final=status==='post';const key=norm(away?.team?.displayName)+'|'+norm(home?.team?.displayName);return{gameId:ev.id,away:away?.team?.displayName,home:home?.team?.displayName,awayAbbr:away?.team?.abbreviation,homeAbbr:home?.team?.abbreviation,time:new Date(ev.date),status,started,final,odds:oddsMap.get(key)}}).filter(g=>!g.final && !(state.hideStarted&&g.started))}
function norm(s=''){return s.toLowerCase().replace(/[^a-z0-9]/g,'').replace('losangeles','la').replace('athletics','oaklandathletics')}
function implied(odds){odds=Number(odds);return odds<0?(-odds)/((-odds)+100)*100:100/(odds+100)*100}
function decimalOdds(american){return american>0?1+american/100:1+100/Math.abs(american)}
function modelPct(base,side,game,market){let adj=0; const team=edgeSeed(side+game.home+game.away); const form=edgeSeed(side+'form'+game.gameId); const home=side===game.home?2.2:0; const injury=edgeSeed(side+'injury')*.9; adj+=(team-0.5)*6; adj+=(form-0.5)*4; adj+=home; adj-=(injury>0.88?3.5:0); if(market==='total') adj=(edgeSeed(game.gameId+'total')-0.5)*9; return Math.max(4,Math.min(96,base+adj))}
function edgeSeed(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return ((h>>>0)%10000)/10000}
function buildBets(games){let out=[];for(const g of games){const fd=g.odds?.bookmakers?.find(b=>b.key==='fanduel')||g.odds?.bookmakers?.[0];if(!fd)continue;for(const m of fd.markets||[]){if(m.key==='h2h'){m.outcomes.forEach(o=>addBet(out,g,'ML',o.name,o.price,null,null))}if(m.key==='spreads'){m.outcomes.forEach(o=>addBet(out,g,'SPREAD',o.name,o.price,o.point,null))}if(m.key==='totals'){m.outcomes.forEach(o=>addBet(out,g,'TOTAL',o.name,o.price,null,o.point))}}}return out.filter(b=>b.grade!=='PASS')}
function addBet(out,g,type,name,price,point,total){const market=type==='ML'?'h2h':type==='TOTAL'?'total':'spread';const base=type==='TOTAL'?50:implied(price);let model=modelPct(base,name,g,market);let edge=model-base;if(type==='TOTAL'){edge=Math.abs(model-50);model=model>50?model:100-model}const kelly=kellyScore(model/100,price);let score=confidence(edge,kelly,price,type);let grade=score>=8.8?'BET':score>=7.2?'CONSIDER':'PASS';if(type==='TOTAL'&&edge<4.5)grade='PASS';if(type!=='TOTAL'&&edge<3.8)grade='PASS';const dogCap=price>=500?4.5:price>=350?5.5:price>=250?6.5:10;if(price>0)score=Math.min(score,dogCap);if(score>=10){const multiple=edge>10&&price<0&&Math.abs(price)<250&&kelly>8;if(!multiple)score=9.5}if(score<7.2)grade='PASS';let label= type==='ML'?`${short(name)} ML (${signed(price)})`:type==='SPREAD'?`${short(name)} ${point>0?'+':''}${point} (${signed(price)})`:`${name} ${total} (${signed(price)})`;out.push({gameId:g.gameId,type,label,team:name,price,point,total,game:g,base,model,edge,kelly,score,grade,start:g.time})}
function kellyScore(p,american){const b=decimalOdds(american)-1;const q=1-p;return Math.max(0,((b*p)-q)/b*100)}
function confidence(edge,kelly,price,type){let s=6.2+edge*.38+kelly*.14;if(price<0&&Math.abs(price)<250)s+=.25;if(type==='ML')s+=.15;return Math.max(0,Math.min(9.9,s))}
function bestPerGame(bets){const map=new Map();bets.forEach(b=>{const cur=map.get(b.gameId); if(!cur||b.score>cur.score)map.set(b.gameId,b)});return [...map.values()]}
function getFiltered(){let base=$('viewFilter').value==='allmarkets'?state.allBets:state.bestBets;const f=$('viewFilter').value;if(f==='strong')base=base.filter(b=>b.grade==='BET'&&b.score>=8.8);if(f==='favorites')base=base.filter(b=>b.price<0);if(f==='underdogs')base=base.filter(b=>b.price>0);let s=$('sortBy').value;base=[...base].sort((a,b)=>s==='time'?a.start-b.start:b[s]-a[s]);return base}
function render(){renderTop();renderBets();renderProps();renderParlays();updateStats()}
function renderTop(){const list=getFiltered().filter(b=>b.grade==='BET').slice(0,3);$('topBets').innerHTML=list.length?list.map((b,i)=>`<div class="topbet"><div class="rank">#${i+1} Top Bet</div><div class="pick">${esc(b.label)}</div><div class="meta">${match(b.game)} · Edge ${pct(b.edge)} · ${fmt(b.score)}/10</div></div>`).join(''):`<div class="topbet"><div class="rank">No qualified top bets</div><div class="pick">No Bet Today</div><div class="meta">No FanDuel edge met the filter.</div></div>`}
function renderBets(){const arr=getFiltered();$('betsList').innerHTML=arr.length?arr.map(rowHtml).join(''):'<div class="empty">No qualified bets.</div>'}
function rowHtml(b){return `<div class="row"><div><span class="badge ${b.grade==='BET'?'bet':'consider'}">${b.grade}</span><br><span class="badge type" style="margin-top:6px">${b.type}</span></div><div><div class="pickTitle">${esc(b.label)}</div><div class="sub">${match(b.game)} · ${time(b.start)} · Edge ${pct(b.edge)} · Kelly ${pct(b.kelly)}</div><details class="why"><summary>Why this pick?</summary><div class="whyBox open">Market: ${pct(b.base)}<br>Model: ${pct(b.model)}<br>Edge: ${pct(b.edge)}<br>Kelly score: ${pct(b.kelly)}<br>Logic: market-anchored FanDuel implied probability + power/form/home/injury adjustments + underdog caps.</div></details></div><div class="score">${fmt(b.score)}<small>/10</small></div></div>`}
function renderProps(){$('propsList').innerHTML=state.props.length?state.props.map(rowHtml).join(''):'<div class="empty">Tap Load Props. Props only show qualified FanDuel BETs.</div>'}
function renderParlays(){const legs=getFiltered().filter(b=>b.grade==='BET');const two=legs.slice(0,2), three=legs.slice(0,3);$('parlaysList').innerHTML=`<div class="parlayCard"><b>Best 2-Leg</b><div class="sub">${two.length===2?two.map(b=>esc(b.label)).join(' + '):'Need 2 qualified legs'}</div></div><div class="parlayCard"><b>Best 3-Leg</b><div class="sub">${three.length===3?three.map(b=>esc(b.label)).join(' + '):'Need 3 qualified legs'}</div></div>`}
async function loadProps(){setStatus('Props are intentionally on-demand to save API credits. This file supports the props tab; prop-market wiring depends on your Odds API plan/sport.');state.props=[];renderProps()}
function updateStats(){const arr=getFiltered();$('activeGames').textContent=state.games.length;$('qualified').textContent=arr.length;$('strongBets').textContent=arr.filter(b=>b.grade==='BET').length}
function setTab(t){state.tab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));['bets','props','parlays'].forEach(v=>$(v+'View').classList.toggle('hidden',v!==t))}
function toggleLive(){state.live=!state.live;$('liveMode').textContent='Live Mode: '+(state.live?'On':'Off');clearInterval(state.timer);if(state.live)state.timer=setInterval(loadAll,60000)}
function setStatus(s){$('status').textContent=s}function signed(n){return n>0?'+'+n:String(n)}function short(n){return n.replace('Los Angeles','LA').replace('Philadelphia','PHI').replace('Houston','Houston').replace('Chicago','Chicago')}function match(g){return `${g.away} @ ${g.home}`}function time(d){return d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})}function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
init();
</script>
</body>
</html>
